<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Space+Grotesk:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --cork-1:#b98d5d;
    --cork-2:#a67c52;
    --cork-dark:#7d5f3d;
    --paper:#faf6ee;
    --paper-2:#f2ead9;
    --paper-3:#efe4cc;
    --ink:#2c2620;
    --ink-soft:#5a5040;
    --thread:#b3342e;
    --brass:#a9895a;
    --carriera:#2c4a5e;
    --business:#b8862c;
    --creativo:#a85272;
    --avventura:#3f6b4c;
    --personale:#8a4a36;
    --shadow:0 10px 24px rgba(30,20,10,.35);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;overflow:hidden;}
  body{
    font-family:'Work Sans',sans-serif;color:var(--ink);
    background:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,.05), transparent 40%),
      repeating-radial-gradient(circle at 0 0, rgba(0,0,0,.05) 0, rgba(0,0,0,.05) 1px, transparent 2px, transparent 6px),
      linear-gradient(160deg, var(--cork-1), var(--cork-2) 55%, var(--cork-dark));
  }

  #app{display:grid;grid-template-columns:236px 1fr 300px;height:100vh;position:relative;z-index:1;}

  /* ============ left margin: journal spine ============ */
  #left{
    background:
      linear-gradient(90deg, rgba(0,0,0,.18), transparent 12px),
      repeating-linear-gradient(0deg, transparent 0 26px, rgba(120,90,50,.12) 26px 27px),
      var(--paper-2);
    border-right:2px solid rgba(90,70,40,.35);
    padding:26px 20px;display:flex;flex-direction:column;gap:20px;
    box-shadow:inset -8px 0 14px -10px rgba(40,25,10,.4);
  }
  #left::before{
    content:"";position:absolute;left:224px;top:0;bottom:0;width:12px;pointer-events:none;
    background:repeating-linear-gradient(0deg, transparent 0 34px, transparent 34px 40px);
  }
  .spine-holes{position:absolute;left:8px;top:0;bottom:0;width:14px;display:flex;flex-direction:column;justify-content:space-evenly;pointer-events:none;}
  .spine-holes i{width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 35% 35%, #8a6a42, #4c3a22);box-shadow:inset 0 1px 2px rgba(0,0,0,.6);}
  #left h1{
    font-family:'Caveat',cursive;font-size:40px;line-height:.95;margin:0;transform:rotate(-2deg);
    color:var(--ink);padding-left:10px;
  }
  #left h1 em{font-style:normal;color:var(--thread);}
  .tagline{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-soft);margin:4px 0 0 12px;}
  #dateStamp{
    align-self:flex-start;margin-left:10px;font-family:'IBM Plex Mono',monospace;font-size:10px;
    color:#8a3a30;border:1.5px solid #a4483c;border-radius:4px;padding:3px 8px;transform:rotate(-3deg);
    letter-spacing:.1em;opacity:.85;background:rgba(255,255,255,.3);
  }
  #filters{display:flex;flex-direction:column;gap:9px;padding-left:10px;}
  .chip{
    display:flex;align-items:center;gap:9px;cursor:pointer;font-size:12.5px;font-weight:500;
    padding:7px 10px;background:var(--paper);border-radius:3px;position:relative;
    box-shadow:1px 2px 5px rgba(40,25,10,.25);transition:transform .15s, opacity .2s;
    transform:rotate(var(--r,0deg));
  }
  .chip:nth-child(1){--r:-1deg;} .chip:nth-child(2){--r:.8deg;} .chip:nth-child(3){--r:-.6deg;}
  .chip:nth-child(4){--r:1deg;} .chip:nth-child(5){--r:-.9deg;}
  .chip:hover{transform:rotate(var(--r,0deg)) translateY(-2px);}
  .chip.off{opacity:.4;}
  .chip::before{
    content:"";position:absolute;top:-6px;left:50%;transform:translateX(-50%) rotate(-4deg);
    width:34px;height:11px;background:var(--tape,rgba(200,180,140,.6));opacity:.75;border-radius:1px;
  }
  .chip .swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.15);}
  #addBtn{
    margin-top:auto;margin-left:10px;background:var(--thread);color:#fff8ef;border:none;cursor:pointer;
    font-family:'Caveat',cursive;font-size:21px;padding:8px 16px;border-radius:4px;transform:rotate(-1.5deg);
    box-shadow:2px 3px 0 rgba(80,20,15,.5);transition:transform .15s;
  }
  #addBtn:hover{transform:rotate(-1.5deg) translateY(-2px);}
  .hint{font-size:11px;color:var(--ink-soft);line-height:1.55;padding-left:10px;font-style:italic;}
  #count{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-soft);padding-left:10px;}

  /* ============ center: the board ============ */
  #board{position:relative;overflow:hidden;}
  #board::after{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:1;
    box-shadow:inset 0 0 80px 20px rgba(45,28,10,.35);
  }
  #threads{position:absolute;inset:0;width:100%;height:100%;z-index:6;pointer-events:none;}
  #threads path{stroke:var(--thread);stroke-width:2;fill:none;opacity:0;transition:opacity .35s ease;
    filter:drop-shadow(1px 2px 1px rgba(60,20,10,.35));}
  #threads path.show{opacity:.85;}

  #scrim{position:absolute;inset:0;z-index:8;background:rgba(40,26,12,.45);opacity:0;pointer-events:none;transition:opacity .3s;}
  #board.has-focus #scrim{opacity:1;pointer-events:auto;}

  .card-pos{position:absolute;z-index:5;touch-action:none;}
  .card-pos.dragging{z-index:40;}
  .card-pos.dragging .card-body{transform:scale(1.05) rotate(var(--rot));box-shadow:0 22px 44px rgba(30,18,8,.5);cursor:grabbing;}
  #board.has-focus .card-body:not(.focused){opacity:.35;filter:saturate(.55);}

  .card-body{
    width:172px;cursor:grab;position:relative;transform:rotate(var(--rot));
    transition:transform .22s ease, box-shadow .22s ease, opacity .25s, filter .25s;
  }
  .card-body:hover{transform:rotate(var(--rot)) translateY(-3px);}
  .card-body.focused{transform:rotate(0deg) scale(1.12);z-index:30;box-shadow:0 24px 50px rgba(30,18,8,.55);}

  .pin{
    position:absolute;top:-9px;left:50%;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;
    background:radial-gradient(circle at 32% 30%, #f2d8a0, var(--brass) 55%, #6b5330);
    box-shadow:0 3px 4px rgba(30,18,8,.5), inset 0 -2px 3px rgba(60,40,15,.6);z-index:3;
  }
  .card-tape .pin{display:none;}
  .card-tape::before{
    content:"";position:absolute;top:-9px;left:50%;transform:translateX(-50%) rotate(var(--tape-rot,-5deg));
    width:58px;height:17px;background:var(--tape-col,rgba(220,200,160,.75));opacity:.85;z-index:3;
    box-shadow:0 1px 2px rgba(40,25,10,.25);
  }

  /* --- archetype: paper note --- */
  .arch-paper .inner{
    background:var(--paper);padding:12px 13px 13px;box-shadow:var(--shadow);
    border-radius:2px;
  }
  /* --- archetype: sticky --- */
  .arch-sticky .inner{
    background:linear-gradient(175deg, #fbf0b8, #f4de8c);padding:13px 13px 15px;
    box-shadow:var(--shadow);border-radius:1px;
  }
  .arch-sticky .card-title{font-family:'Caveat',cursive;font-size:21px;font-weight:700;}
  .arch-sticky .card-note{font-family:'Caveat',cursive;font-size:16px;line-height:1.25;}
  /* --- archetype: polaroid --- */
  .arch-polaroid .inner{
    background:#fdfbf6;padding:9px 9px 12px;box-shadow:var(--shadow);border-radius:1px;
  }
  .arch-polaroid .photo{
    height:84px;margin-bottom:9px;border-radius:1px;
    background:
      radial-gradient(circle at 70% 30%, rgba(255,255,255,.25), transparent 50%),
      linear-gradient(150deg, var(--cat-col) 0%, color-mix(in srgb, var(--cat-col) 55%, #1c1712) 100%);
    display:flex;align-items:center;justify-content:center;color:rgba(255,250,240,.85);
    font-family:'Caveat',cursive;font-size:26px;text-shadow:0 2px 6px rgba(0,0,0,.35);
  }
  /* --- archetype: clipping (torn) --- */
  .arch-clipping .inner{
    background:var(--paper-3);padding:13px 14px;box-shadow:var(--shadow);
    clip-path:polygon(0 3%, 4% 0, 12% 2%, 22% 0, 33% 3%, 46% 0, 58% 2%, 70% 0, 82% 3%, 93% 0, 100% 4%,
      99% 20%, 100% 40%, 98% 62%, 100% 82%, 99% 96%, 92% 100%, 80% 98%, 66% 100%, 52% 97%, 38% 100%, 24% 98%, 10% 100%, 2% 97%, 0 80%, 1% 55%, 0 30%);
  }
  .arch-clipping .card-title{font-family:'Space Grotesk',sans-serif;text-transform:uppercase;letter-spacing:.03em;font-size:13px;}

  .card-tag{
    display:inline-flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;
    font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);margin-bottom:6px;
  }
  .card-tag .dot{width:7px;height:7px;border-radius:50%;background:var(--cat-col);}
  .card-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;line-height:1.22;margin:0 0 5px;}
  .card-note{font-size:11.5px;line-height:1.4;color:var(--ink-soft);margin:0;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}

  /* ============ right margin: detail page ============ */
  #right{
    background:
      linear-gradient(-90deg, rgba(0,0,0,.15), transparent 10px),
      repeating-linear-gradient(0deg, transparent 0 27px, rgba(150,110,120,.16) 27px 28px),
      var(--paper);
    border-left:2px solid rgba(90,70,40,.35);padding:28px 22px;overflow-y:auto;
    box-shadow:inset 8px 0 14px -10px rgba(40,25,10,.4);
  }
  #right::before{
    content:"";position:fixed;top:0;bottom:0;width:2px;background:rgba(190,90,90,.45);
    margin-left:26px;pointer-events:none;
  }
  .idle-msg{margin-top:46%;text-align:center;color:var(--ink-soft);}
  .idle-msg b{font-family:'Caveat',cursive;font-size:24px;font-weight:700;display:block;transform:rotate(-2deg);color:var(--ink);}
  .idle-msg span{font-size:11px;font-family:'IBM Plex Mono',monospace;display:block;margin-top:8px;letter-spacing:.04em;}
  .detail-tag{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;
    font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);margin:0 0 8px 34px;}
  .detail-tag .dot{width:8px;height:8px;border-radius:50%;}
  #right h2{font-family:'Caveat',cursive;font-size:34px;font-weight:700;margin:0 0 12px 34px;line-height:1;transform:rotate(-1deg);}
  #right textarea{
    width:calc(100% - 34px);margin-left:34px;min-height:150px;background:transparent;
    border:none;border-bottom:1.5px dashed rgba(90,70,40,.4);
    color:var(--ink);font-family:'Caveat',cursive;font-size:19px;line-height:27px;padding:2px 4px;resize:vertical;
  }
  #right textarea:focus{outline:none;border-bottom-color:var(--thread);}
  .detail-actions{display:flex;gap:8px;margin:16px 0 0 34px;flex-wrap:wrap;}
  .btn{
    background:var(--paper-2);border:1.5px solid rgba(90,70,40,.4);color:var(--ink);cursor:pointer;
    padding:7px 12px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:11px;
    box-shadow:1px 2px 0 rgba(70,50,25,.3);
  }
  .btn.primary{background:var(--thread);color:#fff8ef;border-color:#8a2e28;}
  .btn.danger{color:#8a2e28;}
  .btn:active{transform:translateY(1px);box-shadow:none;}

  /* ============ modal ============ */
  .modal-overlay{position:fixed;inset:0;background:rgba(40,26,12,.6);display:none;align-items:center;justify-content:center;z-index:100;}
  .modal-overlay.show{display:flex;}
  .modal{
    background:var(--paper);border-radius:3px;padding:26px;width:350px;position:relative;
    box-shadow:0 24px 60px rgba(20,12,5,.55);transform:rotate(-.6deg);
  }
  .modal::before{
    content:"";position:absolute;top:-11px;left:50%;transform:translateX(-50%) rotate(-4deg);
    width:90px;height:22px;background:rgba(213,190,140,.8);box-shadow:0 1px 3px rgba(40,25,10,.3);
  }
  .modal h3{font-family:'Caveat',cursive;font-size:27px;font-weight:700;margin:0 0 16px;transform:rotate(-1deg);}
  .field{margin-bottom:13px;}
  .field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;
    letter-spacing:.06em;color:var(--ink-soft);margin-bottom:5px;}
  .field input,.field textarea{
    width:100%;background:rgba(255,255,255,.6);border:1.5px solid rgba(90,70,40,.35);border-radius:3px;
    padding:8px 10px;font-family:'Work Sans',sans-serif;font-size:13px;color:var(--ink);
  }
  .field textarea{min-height:64px;resize:vertical;}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--thread);}
  .cat-row{display:flex;flex-wrap:wrap;gap:7px;}
  .cat-pick{
    display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:3px;cursor:pointer;
    border:1.5px solid rgba(90,70,40,.3);font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-soft);
    background:rgba(255,255,255,.5);
  }
  .cat-pick .dot{width:8px;height:8px;border-radius:50%;}
  .cat-pick.sel{border-color:var(--thread);color:var(--ink);background:#fff;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px;}

  #toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px) rotate(-1deg);
    background:var(--paper);border:1.5px solid rgba(90,70,40,.45);color:var(--ink);padding:9px 18px;
    border-radius:3px;font-family:'Caveat',cursive;font-size:19px;opacity:0;pointer-events:none;
    transition:opacity .3s, transform .3s;z-index:200;box-shadow:0 8px 22px rgba(30,18,8,.4);
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0) rotate(-1deg);}

  @media (max-width:900px){
    #app{grid-template-columns:60px 1fr;}
    #left{padding:16px 8px;}
    #left h1,.tagline,.hint,#dateStamp,#count{display:none;}
    .chip span.label{display:none;}
    .chip{justify-content:center;padding:8px 6px;}
    #addBtn{font-size:17px;padding:7px 8px;margin-left:0;}
    #right{position:fixed;top:0;right:0;height:100%;width:min(88vw,330px);z-index:60;
      transform:translateX(100%);transition:transform .3s ease;}
    #right.open{transform:translateX(0);}
    .card-body{width:146px;}
  }
</style>
</head>
<body>
<div id="app">

  <aside id="left">
    <div class="spine-holes"><i></i><i></i><i></i><i></i><i></i><i></i></div>
    <div>
      <h1>Vision<br><em>Journal</em></h1>
      <p class="tagline">tutto su una bacheca</p>
    </div>
    <span id="dateStamp"></span>
    <div id="filters"></div>
    <div class="hint">Trascina le schede dove vuoi. Passa sopra una categoria per tendere il filo rosso tra le idee.</div>
    <span id="count"></span>
    <button id="addBtn">+ appunta un'idea</button>
  </aside>

  <main id="board">
    <svg id="threads"></svg>
    <div id="scrim"></div>
  </main>

  <aside id="right">
    <div class="idle-msg"><b>pagina bianca</b><span>tocca una scheda sulla bacheca</span></div>
  </aside>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Appunta un'idea</h3>
    <div class="field">
      <label>Titolo</label>
      <input type="text" id="fTitle" placeholder="es. Type rating A320">
    </div>
    <div class="field">
      <label>Nota</label>
      <textarea id="fNote" placeholder="dettagli, prossimo passo…"></textarea>
    </div>
    <div class="field">
      <label>Categoria</label>
      <div class="cat-row" id="catPicker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" id="cancelBtn">Annulla</button>
      <button class="btn primary" id="saveBtn">Appunta</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
"use strict";
const CATS = {
  carriera:  {label:"Carriera",  color:"#2c4a5e", tape:"rgba(114,150,175,.7)"},
  business:  {label:"Business",  color:"#b8862c", tape:"rgba(222,186,110,.75)"},
  creativo:  {label:"Creativo",  color:"#a85272", tape:"rgba(216,140,168,.7)"},
  avventura: {label:"Avventura", color:"#3f6b4c", tape:"rgba(128,178,140,.7)"},
  personale: {label:"Personale", color:"#8a4a36", tape:"rgba(205,140,115,.7)"},
};
const ARCHS = ["paper","sticky","polaroid","clipping"];
const STORAGE_KEY = "vision-journal:cards";
const DRAG_THRESHOLD = 5;

let cards = [];
let activeCats = new Set(Object.keys(CATS));
let focusedId = null;
let hoverCat = null;

const boardEl = document.getElementById("board");
const svgEl = document.getElementById("threads");
const rightEl = document.getElementById("right");
const filtersEl = document.getElementById("filters");
const countEl = document.getElementById("count");
const toastEl = document.getElementById("toast");

const rand = (a,b)=>a+Math.random()*(b-a);
const pick = a=>a[Math.floor(Math.random()*a.length)];
const uid = ()=>"c"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);

document.getElementById("dateStamp").textContent =
  new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"short",year:"numeric"}).toUpperCase();

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  setTimeout(()=>toastEl.classList.remove("show"), 1700);
}
function escapeHtml(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}

function seedCards(){
  return [
    {id:uid(),cat:"carriera", arch:"clipping",x:8, y:12,rot:-2.5,title:"Ryanair Gateway 2",note:"Programma cadet low-hour: CV, APS MCC e assessment. Prossimo passo: application aggiornata."},
    {id:uid(),cat:"carriera", arch:"paper",   x:30,y:6, rot:1.8, title:"ITA Airways",note:"Outreach tramite contatti di settore, follow-up regolari."},
    {id:uid(),cat:"business", arch:"polaroid",x:55,y:14,rot:-1.5,title:"AI × Hospitality",note:"Primi clienti pilota tramite il contatto di famiglia nel ricettivo."},
    {id:uid(),cat:"creativo", arch:"sticky",  x:78,y:8, rot:2.5, title:"Brand abbigliamento",note:"Identità visiva + prima capsule."},
    {id:uid(),cat:"creativo", arch:"paper",   x:16,y:52,rot:-1.2,title:"Content creation",note:"Contenuti su aviazione e lifestyle, crescita del canale."},
    {id:uid(),cat:"avventura",arch:"polaroid",x:44,y:58,rot:2,   title:"Apnea · Marina di RA",note:"Frenzel, tabelle CO2/O2, uscite ai frangiflutti."},
    {id:uid(),cat:"avventura",arch:"clipping",x:68,y:44,rot:-2,  title:"Sim MSFS 737",note:"PMDG 737-800 + SPAD.neXt — allenamento procedure."},
    {id:uid(),cat:"personale",arch:"sticky",  x:33,y:76,rot:-2.8,title:"Tempo per noi",note:"Prossimo weekend fuori da pianificare ♥"},
  ];
}

async function loadCards(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    cards = res && res.value ? JSON.parse(res.value) : seedCards();
  }catch(e){ cards = seedCards(); }
  if(!cards.length) cards = seedCards();
  render();
}
async function saveCards(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(cards), false); }
  catch(e){ showToast("salvataggio non riuscito"); }
}

/* ---------- filters ---------- */
function buildFilters(){
  filtersEl.innerHTML = "";
  Object.entries(CATS).forEach(([id,c])=>{
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.dataset.cat = id;
    chip.style.setProperty("--tape", c.tape);
    chip.innerHTML = `<span class="swatch" style="background:${c.color}"></span><span class="label">${c.label}</span>`;
    chip.addEventListener("click", ()=>{
      if(activeCats.has(id)) activeCats.delete(id); else activeCats.add(id);
      applyFilters();
      if(hoverCat===id) drawThreads(id);
    });
    chip.addEventListener("mouseenter", ()=>{ hoverCat=id; drawThreads(id); });
    chip.addEventListener("mouseleave", ()=>{ hoverCat=null; clearThreads(); });
    filtersEl.appendChild(chip);
  });
}
function applyFilters(){
  document.querySelectorAll(".chip").forEach(chip=>
    chip.classList.toggle("off", !activeCats.has(chip.dataset.cat)));
  document.querySelectorAll(".card-pos").forEach(pos=>
    pos.style.display = activeCats.has(pos.dataset.cat) ? "" : "none");
}

/* ---------- render ---------- */
function render(){
  buildFilters();
  boardEl.querySelectorAll(".card-pos").forEach(n=>n.remove());
  cards.forEach(card=>{
    const c = CATS[card.cat];
    const pos = document.createElement("div");
    pos.className = "card-pos";
    pos.dataset.id = card.id;
    pos.dataset.cat = card.cat;
    pos.style.left = card.x + "%";
    pos.style.top = card.y + "%";

    const body = document.createElement("div");
    const tapeArch = card.arch === "sticky" || card.arch === "clipping";
    body.className = `card-body arch-${card.arch}` + (tapeArch ? " card-tape" : "");
    body.style.setProperty("--rot", (card.rot||0)+"deg");
    body.style.setProperty("--cat-col", c.color);
    if(tapeArch){
      body.style.setProperty("--tape-col", c.tape);
      body.style.setProperty("--tape-rot", (card.rot>0?-6:5)+"deg");
    }

    let inner = `<span class="pin"></span><div class="inner">`;
    if(card.arch === "polaroid"){
      inner += `<div class="photo">${escapeHtml(initials(card.title))}</div>`;
    }
    inner += `
      <div class="card-tag"><span class="dot"></span>${c.label}</div>
      <p class="card-title">${escapeHtml(card.title)}</p>
      <p class="card-note">${escapeHtml(card.note)}</p>
    </div>`;
    body.innerHTML = inner;

    attachDrag(pos, body, card);
    pos.appendChild(body);
    boardEl.insertBefore(pos, document.getElementById("scrim"));
  });
  applyFilters();
  countEl.textContent = cards.length + (cards.length===1 ? " idea appuntata" : " idee appuntate");
  if(focusedId) renderDetail(focusedId);
}
function initials(t){
  return (t||"?").split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase();
}

/* ---------- drag & drop (pointer events) ---------- */
function attachDrag(pos, body, card){
  let startX, startY, origLeft, origTop, moved;
  body.addEventListener("pointerdown", e=>{
    if(e.button !== 0 && e.pointerType === "mouse") return;
    e.preventDefault();
    body.setPointerCapture(e.pointerId);
    startX = e.clientX; startY = e.clientY; moved = false;
    const rect = boardEl.getBoundingClientRect();
    origLeft = (card.x/100)*rect.width;
    origTop = (card.y/100)*rect.height;

    const onMove = ev=>{
      const dx = ev.clientX - startX, dy = ev.clientY - startY;
      if(!moved && Math.hypot(dx,dy) > DRAG_THRESHOLD){
        moved = true;
        pos.classList.add("dragging");
        if(focusedId) unfocus();
      }
      if(moved){
        const w = pos.offsetWidth, h = pos.offsetHeight;
        let nl = Math.min(Math.max(origLeft+dx, -w*0.3), rect.width - w*0.55);
        let nt = Math.min(Math.max(origTop+dy, 4), rect.height - h*0.5);
        pos.style.left = (nl/rect.width*100) + "%";
        pos.style.top = (nt/rect.height*100) + "%";
        if(hoverCat === card.cat) drawThreads(card.cat);
      }
    };
    const onUp = ev=>{
      body.releasePointerCapture(e.pointerId);
      body.removeEventListener("pointermove", onMove);
      body.removeEventListener("pointerup", onUp);
      body.removeEventListener("pointercancel", onUp);
      pos.classList.remove("dragging");
      if(moved){
        card.x = parseFloat(pos.style.left);
        card.y = parseFloat(pos.style.top);
        saveCards();
      }else{
        focusCard(card.id);
      }
    };
    body.addEventListener("pointermove", onMove);
    body.addEventListener("pointerup", onUp);
    body.addEventListener("pointercancel", onUp);
  });
}

/* ---------- focus & detail ---------- */
function focusCard(id){
  focusedId = id;
  document.querySelectorAll(".card-pos").forEach(pos=>{
    pos.querySelector(".card-body").classList.toggle("focused", pos.dataset.id===id);
  });
  boardEl.classList.add("has-focus");
  rightEl.classList.add("open");
  renderDetail(id);
}
function unfocus(){
  focusedId = null;
  document.querySelectorAll(".card-body").forEach(b=>b.classList.remove("focused"));
  boardEl.classList.remove("has-focus");
  rightEl.classList.remove("open");
  rightEl.innerHTML = `<div class="idle-msg"><b>pagina bianca</b><span>tocca una scheda sulla bacheca</span></div>`;
}
function renderDetail(id){
  const card = cards.find(c=>c.id===id);
  if(!card) return;
  const c = CATS[card.cat];
  rightEl.innerHTML = `
    <div class="detail-tag"><span class="dot" style="background:${c.color}"></span>${c.label}</div>
    <h2>${escapeHtml(card.title)}</h2>
    <textarea id="detailNote">${escapeHtml(card.note)}</textarea>
    <div class="detail-actions">
      <button class="btn primary" id="detailSave">salva</button>
      <button class="btn danger" id="detailDelete">strappa via</button>
      <button class="btn" id="detailClose">chiudi</button>
    </div>
  `;
  document.getElementById("detailSave").addEventListener("click", ()=>{
    card.note = document.getElementById("detailNote").value;
    saveCards(); render(); showToast("annotato ✎");
  });
  document.getElementById("detailClose").addEventListener("click", unfocus);
  const del = document.getElementById("detailDelete");
  del.addEventListener("click", ()=>{
    if(del.dataset.confirm){
      cards = cards.filter(c=>c.id!==id);
      saveCards(); unfocus(); render(); showToast("strappata via");
    }else{
      del.dataset.confirm = "1"; del.textContent = "sicuro?";
      setTimeout(()=>{ del.dataset.confirm=""; del.textContent="strappa via"; }, 2500);
    }
  });
}

/* ---------- red thread ---------- */
function drawThreads(catId){
  svgEl.innerHTML = "";
  if(!activeCats.has(catId)) return;
  const rect = boardEl.getBoundingClientRect();
  const points = [];
  document.querySelectorAll(`.card-pos[data-cat="${catId}"]`).forEach(pos=>{
    if(pos.style.display === "none") return;
    const pin = pos.querySelector(".pin");
    const anchor = (pin && getComputedStyle(pin).display !== "none") ? pin : pos.querySelector(".card-body");
    const r = anchor.getBoundingClientRect();
    points.push({ x:r.left + r.width/2 - rect.left, y:r.top + (anchor===pin ? r.height/2 : 4) - rect.top });
  });
  if(points.length < 2){
    if(points.length === 1) drawKnot(points[0]);
    requestAnimationFrame(()=>svgEl.querySelectorAll("path").forEach(p=>p.classList.add("show")));
    return;
  }
  // connect pins as a slack string path (nearest-neighbour chain, then close loop feel)
  const chain = [points[0]];
  const rest = points.slice(1);
  while(rest.length){
    const last = chain[chain.length-1];
    let bi = 0, bd = Infinity;
    rest.forEach((p,i)=>{ const d=(p.x-last.x)**2+(p.y-last.y)**2; if(d<bd){bd=d;bi=i;} });
    chain.push(rest.splice(bi,1)[0]);
  }
  for(let i=0;i<chain.length-1;i++) drawSlack(chain[i], chain[i+1]);
  if(chain.length > 2) drawSlack(chain[chain.length-1], chain[0]);
  chain.forEach(drawKnot);
  requestAnimationFrame(()=>svgEl.querySelectorAll("path").forEach(p=>p.classList.add("show")));
}
function drawSlack(a,b){
  const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
  const dist = Math.hypot(b.x-a.x, b.y-a.y);
  const sag = Math.min(38, dist*0.14);
  const path = document.createElementNS("http://www.w3.org/2000/svg","path");
  path.setAttribute("d", `M ${a.x} ${a.y} Q ${mx} ${my+sag} ${b.x} ${b.y}`);
  svgEl.appendChild(path);
}
function drawKnot(p){
  const path = document.createElementNS("http://www.w3.org/2000/svg","path");
  path.setAttribute("d", `M ${p.x-3} ${p.y} a 3 3 0 1 0 6 0 a 3 3 0 1 0 -6 0`);
  path.style.fill = "var(--thread)";
  svgEl.appendChild(path);
}
function clearThreads(){
  svgEl.querySelectorAll("path").forEach(p=>p.classList.remove("show"));
  setTimeout(()=>{ if(!hoverCat) svgEl.innerHTML=""; }, 350);
}

document.getElementById("scrim").addEventListener("click", unfocus);
document.addEventListener("keydown", e=>{
  if(e.key === "Escape"){
    if(modalOverlay.classList.contains("show")) closeModal();
    else if(focusedId) unfocus();
  }
});
window.addEventListener("resize", ()=>{ if(hoverCat) drawThreads(hoverCat); });

/* ---------- modal ---------- */
const modalOverlay = document.getElementById("modalOverlay");
const catPicker = document.getElementById("catPicker");
let pickedCat = "carriera";

function buildCatPicker(){
  catPicker.innerHTML = "";
  Object.entries(CATS).forEach(([id,c])=>{
    const el = document.createElement("div");
    el.className = "cat-pick" + (id===pickedCat ? " sel" : "");
    el.dataset.cat = id;
    el.innerHTML = `<span class="dot" style="background:${c.color}"></span>${c.label}`;
    el.addEventListener("click", ()=>{
      pickedCat = id;
      catPicker.querySelectorAll(".cat-pick").forEach(n=>n.classList.toggle("sel", n.dataset.cat===id));
    });
    catPicker.appendChild(el);
  });
}
function openModal(){
  document.getElementById("fTitle").value = "";
  document.getElementById("fNote").value = "";
  pickedCat = "carriera";
  buildCatPicker();
  modalOverlay.classList.add("show");
  document.getElementById("fTitle").focus();
}
function closeModal(){ modalOverlay.classList.remove("show"); }

document.getElementById("addBtn").addEventListener("click", openModal);
document.getElementById("cancelBtn").addEventListener("click", closeModal);
modalOverlay.addEventListener("click", e=>{ if(e.target===modalOverlay) closeModal(); });
document.getElementById("saveBtn").addEventListener("click", ()=>{
  const title = document.getElementById("fTitle").value.trim();
  const note = document.getElementById("fNote").value.trim();
  if(!title && !note){ showToast("serve almeno un titolo"); return; }
  cards.push({
    id:uid(), cat:pickedCat, arch:pick(ARCHS),
    title: title || "Senza titolo", note,
    x:rand(10,78), y:rand(8,78), rot:rand(-3,3)
  });
  saveCards(); closeModal(); render(); showToast("appuntata ✎");
});

loadCards();
</script>
